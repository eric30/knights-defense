<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<title>俠客守江山 · 武俠塔防</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #f4ead5;
    --paper-2: #ead9b0;
    --paper-3: #d8c08a;
    --ink: #2a241c;
    --ink-soft: #4a3f32;
    --cinnabar: #b23a2a;
    --cinnabar-d: #7d2519;
    --bamboo: #6b8e4e;
    --bamboo-d: #3e5a2e;
    --gold: #c9a24a;
    --wood: #6b4a2b;
    --wood-d: #3e2912;
    --grass: #8fb86a;
    --grass-d: #6a9049;
    --path: #d8c085;
    --path-d: #b89960;
    --shadow: 0 4px 0 rgba(42,36,28,.25), 0 10px 24px rgba(42,36,28,.18);
  }
  html, body {
    margin: 0; padding: 0;
    background: #1d1610;
    font-family: "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Outer page – dark theatre so scroll looks hung */
  body {
    background:
      radial-gradient(ellipse at 50% 10%, #352a1d 0%, #1d1610 60%, #0f0a06 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
  }
  #root { width: 100%; display: flex; justify-content: center; }
  .serif { font-family: "Noto Serif TC", serif; }
  .kuaile { font-family: "ZCOOL KuaiLe", "Noto Serif TC", cursive; }

  /* -------- Scroll shell -------- */
  .scroll {
    width: min(1280px, 100%);
    position: relative;
    padding: 28px 0;
  }
  .scroll-body {
    background:
      /* subtle fiber */
      repeating-linear-gradient(90deg, rgba(120,90,40,.04) 0 2px, transparent 2px 5px),
      radial-gradient(ellipse at 20% 10%, rgba(200,160,90,.25), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(160,120,60,.22), transparent 55%),
      linear-gradient(180deg, #f7ecd3, #ecdcb4);
    border-left: 2px solid #caa971;
    border-right: 2px solid #caa971;
    box-shadow:
      inset 0 0 0 1px rgba(120,90,40,.15),
      inset 0 30px 60px rgba(120,90,40,.18),
      inset 0 -30px 60px rgba(120,90,40,.18);
    padding: 28px 34px 34px;
    position: relative;
  }
  .scroll-body::before, .scroll-body::after {
    content: ""; position: absolute; left: 0; right: 0; height: 16px;
    background:
      linear-gradient(180deg, rgba(80,55,20,.35), transparent),
      repeating-linear-gradient(90deg, rgba(120,90,40,.2) 0 2px, transparent 2px 6px);
  }
  .scroll-body::before { top: 0; }
  .scroll-body::after { bottom: 0; transform: scaleY(-1); }

  .rod {
    height: 28px;
    border-radius: 18px;
    background:
      linear-gradient(180deg, #a5764a 0%, #6b4a2b 50%, #3e2912 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,220,170,.35),
      inset 0 -4px 6px rgba(0,0,0,.45),
      0 8px 20px rgba(0,0,0,.55);
    position: relative;
    margin: 0 -10px;
  }
  .rod::before, .rod::after {
    content: ""; position: absolute; top: -6px; bottom: -6px; width: 40px;
    border-radius: 10px;
    background: radial-gradient(ellipse at 50% 30%, #d9a35a, #6b4a2b 70%, #2a1a08);
    box-shadow: 0 4px 10px rgba(0,0,0,.6), inset 0 2px 0 rgba(255,220,170,.4);
  }
  .rod::before { left: -8px; }
  .rod::after { right: -8px; }
  .rod-top { margin-bottom: -6px; }
  .rod-bot { margin-top: -6px; }

  /* Vermilion seal */
  .seal {
    display: inline-flex; align-items: center; justify-content: center;
    width: 68px; height: 68px;
    background: var(--cinnabar);
    color: #fcefd1;
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    border-radius: 6px;
    line-height: 1;
    font-size: 22px;
    padding: 6px;
    text-align: center;
    box-shadow: inset 0 0 0 3px #fcefd1, inset 0 0 0 5px var(--cinnabar), 0 4px 0 var(--cinnabar-d);
    transform: rotate(-6deg);
    letter-spacing: 2px;
  }

  /* -------- Title bar -------- */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .title {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 4px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .title .swash {
    color: var(--cinnabar);
    border-bottom: 3px solid var(--cinnabar);
    padding: 0 2px 2px;
  }
  .subtitle {
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--ink-soft);
    margin-left: 4px;
  }

  /* -------- Top bamboo tray (unit selector) -------- */
  .tray {
    display: flex;
    align-items: stretch;
    gap: 8px;
    background:
      repeating-linear-gradient(90deg,
        #c7a35a 0 38px,
        #b48a43 38px 40px,
        #c7a35a 40px 78px,
        #8e6a2e 78px 80px);
    border: 2px solid var(--wood-d);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: inset 0 2px 0 rgba(255,230,180,.4), inset 0 -4px 6px rgba(0,0,0,.25), 0 4px 0 var(--wood-d);
    position: relative;
    z-index: 600;
  }
  .tray .qi-box {
    min-width: 96px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg,#fff6e1,#f0ddb0);
    border: 2px solid var(--wood-d);
    border-radius: 6px;
    padding: 4px 8px 6px;
    position: relative;
  }
  .qi-value {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--cinnabar-d);
    line-height: 1;
  }
  .qi-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .qi-bar {
    height: 4px;
    width: 100%;
    background: rgba(0,0,0,.1);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .qi-bar > div {
    height: 100%;
    background: linear-gradient(90deg, var(--bamboo), var(--gold));
    transition: width .2s;
  }

  .unit-card {
    width: 76px;
    background: linear-gradient(180deg,#fff6e1,#f0ddb0);
    border: 2px solid var(--wood-d);
    border-radius: 6px;
    padding: 6px 4px 4px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: transform .08s;
  }
  .unit-card:hover { transform: translateY(-2px); z-index: 1001; }
  .unit-card:hover .tip { display: block; }
  .tip {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    width: 210px;
    background: #fff6e1;
    border: 2px solid var(--wood-d);
    border-radius: 8px;
    padding: 10px 12px 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,230,180,.6);
    z-index: 1000;
    text-align: left;
    pointer-events: none;
  }
  .tip::before {
    content: "";
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid var(--wood-d);
  }
  .tip h5 {
    margin: 0 0 4px;
    font-family: "Noto Serif TC", serif; font-weight: 900;
    font-size: 15px; letter-spacing: 3px; color: var(--cinnabar-d);
    border-bottom: 1px dashed rgba(74,63,50,.4);
    padding-bottom: 3px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .tip h5 small { font-size: 10px; letter-spacing: 2px; color: var(--ink-soft); font-weight: 500; }
  .tip .desc { font-size: 12px; line-height: 1.5; color: var(--ink); margin-bottom: 6px; letter-spacing: .5px; }
  .tip .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px;
    font-size: 11px; color: var(--ink-soft);
  }
  .tip .stats b { color: var(--ink); font-weight: 700; margin-left: 4px; }
  .unit-card.selected {
    outline: 3px solid var(--cinnabar);
    box-shadow: 0 0 0 2px #fcefd1, 0 6px 0 var(--cinnabar-d);
  }
  .unit-card.cooling, .unit-card.unaffordable { filter: grayscale(.8) brightness(.85); cursor: not-allowed; }
  /* Whistle (recall) card — a hanging brass bell, visually separate from hero tray */
  .whistle-card {
    width: 72px;
    align-self: center;
    margin: 0 14px 0 6px;
    padding: 0;
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    background: transparent;
    border: none;
    box-shadow: none;
    border-radius: 0;
    transition: transform .12s;
    /* wood plank divider on the right to separate from hero cards */
    border-right: 2px dashed rgba(60,40,18,.35);
    padding-right: 14px;
  }
  .whistle-card:hover { transform: translateY(-1px); }
  .whistle-card .bell-wrap {
    position: relative;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.35));
    animation: bell-sway 3.2s ease-in-out infinite;
    transform-origin: 50% 4px;
  }
  @keyframes bell-sway {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }
  .whistle-card.selected .bell-wrap {
    animation: bell-ring .28s ease-in-out infinite;
    filter: drop-shadow(0 0 10px #ffd66a) drop-shadow(0 2px 3px rgba(0,0,0,.3));
  }
  @keyframes bell-ring {
    0%, 100% { transform: rotate(-12deg); }
    50%      { transform: rotate(12deg); }
  }
  .whistle-card .wname {
    font-family: "Noto Serif TC", serif;
    font-weight: 900; color: #f4ead5; font-size: 13px; margin-top: 4px;
    background: var(--cinnabar);
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 2px;
    box-shadow: 0 2px 0 var(--cinnabar-d);
  }
  .whistle-card.selected .wname {
    background: #2f6fa8;
    box-shadow: 0 2px 0 #1c4a75;
  }
  /* sound waves that emanate when active */
  .whistle-card .wave-burst {
    position: absolute; top: -4px; left: -4px; right: -4px; bottom: 24px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
  }
  .whistle-card.selected .wave-burst {
    border: 2px solid rgba(90,170,230,.7);
    animation: wave-pulse 1.2s ease-out infinite;
  }
  @keyframes wave-pulse {
    0%   { transform: scale(.6); opacity: .9; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  /* cursor hint when recall active */
  .stage.recall-mode .cell:hover { box-shadow: inset 0 0 0 2px #3a8dd1; background: rgba(170,210,240,.18); }
  .stage.recall-mode::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 60px rgba(80,160,220,.35);
    animation: recall-glow 1.4s ease-in-out infinite alternate;
  }
  @keyframes recall-glow {
    from { box-shadow: inset 0 0 40px rgba(80,160,220,.25); }
    to   { box-shadow: inset 0 0 80px rgba(80,160,220,.5); }
  }
  .unit-card .glyph {
    height: 46px;
    display: flex; align-items: center; justify-content: center;
  }
  .unit-card .name {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--ink);
    margin-top: 2px;
  }
  .unit-card .cost {
    display: inline-block;
    margin-top: 2px;
    font-size: 12px;
    font-weight: 700;
    color: #fcefd1;
    background: var(--bamboo-d);
    padding: 1px 8px;
    border-radius: 999px;
  }
  .unit-card .cooldown {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,20,10,.55), rgba(30,20,10,.55));
    border-radius: 4px;
    pointer-events: none;
    clip-path: inset(var(--cd-top, 0%) 0 0 0);
    display: flex; align-items: flex-start; justify-content: center;
    color: #fff; font-weight: 700; font-size: 11px; padding-top: 4px;
  }

  /* -------- Battlefield -------- */
  .stage-wrap {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 14px;
    margin-top: 14px;
  }

  .side-panel {
    display: flex; flex-direction: column; gap: 10px;
  }
  .side-card {
    background: linear-gradient(180deg,#fff6e1,#eccf91);
    border: 2px solid var(--wood-d);
    border-radius: 8px;
    padding: 10px 10px 12px;
    box-shadow: inset 0 2px 0 rgba(255,230,180,.5), 0 3px 0 var(--wood-d);
    text-align: center;
  }
  .side-card h3 {
    margin: 0 0 6px;
    font-family: "Noto Serif TC", serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--ink);
    border-bottom: 1px dashed rgba(74,63,50,.5);
    padding-bottom: 4px;
  }
  .wave-chip {
    background: #fff6e1;
    border: 1px solid var(--wood-d);
    border-radius: 4px;
    padding: 4px 0;
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    color: var(--cinnabar-d);
    font-size: 20px;
  }
  .wave-dots { display: flex; gap: 3px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
  .wave-dot { width: 10px; height: 10px; border-radius: 50%; background: #caa971; border: 1px solid var(--wood-d); }
  .wave-dot.done { background: var(--bamboo); }
  .wave-dot.current { background: var(--cinnabar); box-shadow: 0 0 0 2px #fcefd1; }

  .ctl-btn {
    background: linear-gradient(180deg,#c7a35a,#8e6a2e);
    color: #fff6e1;
    border: 2px solid var(--wood-d);
    border-radius: 6px;
    padding: 8px 6px;
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: inset 0 2px 0 rgba(255,230,180,.4), 0 3px 0 var(--wood-d);
  }
  .ctl-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 0 rgba(255,230,180,.4), 0 2px 0 var(--wood-d); }

  .stage {
    position: relative;
    border: 3px solid var(--wood-d);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 16 / 9;
    box-shadow: inset 0 0 0 2px #fcefd1, 0 4px 0 var(--wood-d);
    background: #98b66f;
  }
  .stage .bg {
    position: absolute; inset: 0;
    background:
      /* distant mountains silhouette */
      radial-gradient(ellipse 40% 22% at 18% 30%, rgba(80,110,80,.55), transparent 70%),
      radial-gradient(ellipse 55% 18% at 58% 28%, rgba(70,100,70,.45), transparent 70%),
      radial-gradient(ellipse 35% 16% at 88% 32%, rgba(60,90,70,.5), transparent 70%),
      /* sun glow */
      radial-gradient(ellipse at 78% 12%, rgba(255,240,180,.55), transparent 50%),
      /* grass shading */
      radial-gradient(ellipse at 18% 82%, rgba(90,130,70,.25), transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(40,60,30,.2), transparent 60%),
      linear-gradient(180deg, #cfe0a8 0%, #a7c77a 28%, #88ad5d 62%, #6d9048 100%);
  }
  /* clouds */
  .stage .bg::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(ellipse 80px 22px at 20% 14%, rgba(255,255,255,.75), transparent 70%),
      radial-gradient(ellipse 120px 26px at 48% 10%, rgba(255,255,255,.65), transparent 70%),
      radial-gradient(ellipse 60px 18px at 72% 18%, rgba(255,255,255,.7), transparent 70%);
    opacity: .85;
    animation: cloud-drift 60s linear infinite;
  }
  @keyframes cloud-drift {
    0% { transform: translateX(0); }
    100% { transform: translateX(20px); }
  }
  .stage.night .bg {
    background:
      /* mountain silhouettes */
      radial-gradient(ellipse 40% 22% at 18% 30%, rgba(20,30,50,.7), transparent 70%),
      radial-gradient(ellipse 55% 18% at 58% 28%, rgba(15,25,45,.65), transparent 70%),
      radial-gradient(ellipse 35% 16% at 88% 32%, rgba(20,30,50,.7), transparent 70%),
      /* moon glow */
      radial-gradient(ellipse at 82% 14%, rgba(220,230,255,.55), transparent 45%),
      radial-gradient(ellipse at 20% 80%, rgba(0,0,0,.3), transparent 60%),
      linear-gradient(180deg, #2b3756 0%, #1c2540 60%, #141b30 100%);
  }
  /* stars */
  .stage.night .bg::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 8%, rgba(255,255,255,.9), transparent),
      radial-gradient(1px 1px at 28% 14%, rgba(255,255,255,.7), transparent),
      radial-gradient(1.5px 1.5px at 42% 6%, rgba(255,255,255,.9), transparent),
      radial-gradient(1px 1px at 58% 16%, rgba(255,255,255,.7), transparent),
      radial-gradient(1.5px 1.5px at 68% 4%, rgba(255,255,255,.95), transparent),
      radial-gradient(1px 1px at 88% 20%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 35% 24%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 94% 8%, rgba(255,255,255,.8), transparent);
    animation: twinkle 3.2s ease-in-out infinite alternate;
    opacity: 1;
  }
  @keyframes twinkle {
    0%   { opacity: .5; }
    100% { opacity: 1; }
  }
  /* fireflies (day) / lanterns (night) floating */
  .stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 14% 60%, rgba(255,220,120,.9), transparent 60%),
      radial-gradient(2px 2px at 32% 88%, rgba(255,220,120,.9), transparent 60%),
      radial-gradient(2px 2px at 68% 72%, rgba(255,220,120,.9), transparent 60%),
      radial-gradient(2px 2px at 86% 40%, rgba(255,220,120,.9), transparent 60%);
    filter: blur(.3px);
    animation: firefly 5s ease-in-out infinite alternate;
    opacity: .7;
  }
  @keyframes firefly {
    0%   { transform: translateY(0); opacity: .4; }
    100% { transform: translateY(-6px); opacity: .9; }
  }
  .stage .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.35) 100%);
    pointer-events: none;
  }

  /* Village at right (home) */
  .village {
    position: absolute; right: 0; top: 0; bottom: 0; width: 7%;
    background:
      linear-gradient(90deg, transparent, rgba(0,0,0,.22));
    display: flex; flex-direction: column; align-items: center; justify-content: space-around;
    padding: 4% 0;
    pointer-events: none;
  }

  /* Attacker spawn at left */
  .wilds {
    position: absolute; left: 0; top: 0; bottom: 0; width: 6%;
    background: linear-gradient(-90deg, transparent, rgba(0,0,0,.25));
    pointer-events: none;
  }

  /* Grid overlay */
  .grid {
    position: absolute;
    left: 7%; right: 9%;
    top: 4%; bottom: 6%;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(5, 1fr);
  }
  .cell {
    border: 1px dashed rgba(60,44,20,.18);
    position: relative;
    transition: background .12s;
  }
  .cell:hover {
    background: rgba(255,247,210,.18);
    box-shadow: inset 0 0 0 2px rgba(178,58,42,.45);
    cursor: pointer;
  }
  .cell.occupied:hover { cursor: not-allowed; box-shadow: inset 0 0 0 2px rgba(0,0,0,.35); }
  .stage.night .cell { border-color: rgba(220,220,255,.14); }

  /* Path stripe overlays - subtle dirt path along each row */
  .lane-stripe {
    position: absolute; left: 0; right: 0; height: calc(100% / 5);
    background:
      linear-gradient(180deg, transparent 20%, rgba(170,130,70,.14) 45%, rgba(170,130,70,.14) 55%, transparent 80%),
      repeating-linear-gradient(90deg, rgba(120,80,30,.12) 0 18px, transparent 18px 36px);
    pointer-events: none;
  }
  /* flowers/grass tufts sprinkled across stage */
  .tufts {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(3px 1.5px at 8% 18%, rgba(60,90,40,.7), transparent 70%),
      radial-gradient(2px 1px at 22% 32%, rgba(200,60,60,.8), transparent 70%),
      radial-gradient(3px 1.5px at 48% 46%, rgba(60,90,40,.7), transparent 70%),
      radial-gradient(2px 1px at 60% 14%, rgba(240,200,80,.9), transparent 70%),
      radial-gradient(3px 1.5px at 78% 62%, rgba(60,90,40,.7), transparent 70%),
      radial-gradient(2px 1px at 90% 36%, rgba(220,140,200,.8), transparent 70%),
      radial-gradient(3px 1.5px at 14% 74%, rgba(60,90,40,.7), transparent 70%),
      radial-gradient(2px 1px at 36% 88%, rgba(240,200,80,.9), transparent 70%),
      radial-gradient(3px 1.5px at 66% 94%, rgba(60,90,40,.7), transparent 70%);
  }
  .stage.night .tufts { opacity: .35; filter: hue-rotate(180deg) brightness(.7); }

  /* banners waving at edges */
  .banner-pole {
    position: absolute; width: 3px; background: linear-gradient(180deg,#6b4a2b,#3e2912);
    pointer-events: none;
  }
  .banner-flag {
    position: absolute; width: 28px; height: 40px;
    background: linear-gradient(180deg,#b23a2a,#7d2519);
    color: #f4ead5; font-family: "Noto Serif TC"; font-weight: 900;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
    box-shadow: 0 2px 4px rgba(0,0,0,.3);
    animation: flag-wave 2.4s ease-in-out infinite;
    transform-origin: left center;
  }
  @keyframes flag-wave {
    0%,100% { transform: skewY(-2deg); }
    50%     { transform: skewY(2deg); }
  }
  /* bamboo stalks */
  .bamboo-stalk {
    position: absolute; width: 6px; pointer-events: none;
    background:
      linear-gradient(180deg, #7a9d4a, #5a7f38),
      repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0 2px, transparent 2px 14px);
    background-blend-mode: multiply;
    border-radius: 2px;
    box-shadow: 1px 0 0 rgba(0,0,0,.2);
  }
  .bamboo-stalk::before, .bamboo-stalk::after {
    content: ""; position: absolute; width: 14px; height: 4px;
    background: #6a9040; border-radius: 50%;
    left: -4px; transform: rotate(-25deg);
  }
  .bamboo-stalk::before { top: 12%; }
  .bamboo-stalk::after { top: 58%; left: 2px; transform: rotate(20deg); }
  /* cherry petals drifting */
  @keyframes petal-fall {
    0%   { transform: translate(0, -20px) rotate(0); opacity: 0; }
    10%  { opacity: .8; }
    90%  { opacity: .8; }
    100% { transform: translate(-24px, 110vh) rotate(320deg); opacity: 0; }
  }
  .petal {
    position: absolute; top: -10px;
    width: 8px; height: 6px;
    background: radial-gradient(ellipse, #ffd6e0 0%, #f59bb0 70%, #d86a8a 100%);
    border-radius: 60% 40% 60% 40%;
    animation: petal-fall 9s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.15));
  }
  .stage.night .petal { background: radial-gradient(ellipse, #c0c8e0, #7f8ab0 80%); }

  /* -------- Entities (placed/enemies/projectiles) -------- */
  .entity { position: absolute; transform: translate(-50%, -50%); pointer-events: none; }
  .bob { animation: bob 1.8s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: translate(-50%, -52%); }
    50%     { transform: translate(-50%, -48%); }
  }
  .enemy-walk { animation: walk 0.45s ease-in-out infinite alternate; }
  @keyframes walk {
    from { transform: translate(-50%, -50%) rotate(-4deg); }
    to   { transform: translate(-50%, -50%) rotate(4deg); }
  }

  .hp {
    position: absolute;
    left: 50%;
    top: -12px;
    transform: translateX(-50%);
    width: 30px; height: 4px;
    background: rgba(0,0,0,.45);
    border: 1px solid #111;
    border-radius: 2px;
    overflow: hidden;
  }
  .hp > div { height: 100%; background: linear-gradient(90deg, #e14b3a, #f6c744); }

  /* Projectile */
  .arrow {
    width: 22px; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, #8b6a3a, #4a3a20);
    position: relative;
  }
  .arrow::after {
    content: ""; position: absolute; left: -5px; top: -3px;
    border-right: 8px solid #2a241c; border-top: 5px solid transparent; border-bottom: 5px solid transparent;
  }
  .star {
    width: 14px; height: 14px; background: #cfd8dc; clip-path: polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 72%,21% 91%,32% 57%,2% 35%,39% 35%); box-shadow: 0 0 0 1px #111;
  }
  .fire { width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(#ffe08a, #ff7a2b 60%, #a02a0a); box-shadow: 0 0 10px rgba(255,140,40,.8); }
  .bomb { width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #666, #222 70%); box-shadow: 0 0 8px rgba(0,0,0,.7), inset 0 -3px 0 rgba(0,0,0,.5); position: relative; }
  .bomb::after { content: ""; position: absolute; top: -6px; left: 50%; width: 4px; height: 6px; background: #f7a94b; border-radius: 50%; box-shadow: 0 0 6px rgba(255,140,40,.9); transform: translateX(-50%); }
  .spear { width: 48px; height: 4px; background: linear-gradient(90deg, rgba(255,230,160,0) 0%, #f4d24b 30%, #fff7d0 60%, rgba(255,230,160,0) 100%); border-radius: 2px; box-shadow: 0 0 12px rgba(244,210,75,.9); animation: spearFlash .22s ease-out forwards; transform-origin: left center; }
  @keyframes spearFlash { 0% { opacity: 0; transform: scaleX(.2); } 35% { opacity: 1; transform: scaleX(1.1); } 100% { opacity: 0; transform: scaleX(1.2); } }

  /* Qi orb */
  .orb {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff5c0, #e8c348 55%, #a07820);
    border: 3px solid #6a4a10;
    box-shadow: 0 0 18px rgba(255,220,100,.85), inset 0 -5px 0 rgba(0,0,0,.22);
    cursor: pointer; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    font-family: "Noto Serif TC", serif; font-weight: 900; color: #6a4a10; font-size: 20px;
    animation: orbPulse 1.6s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100% { box-shadow: 0 0 14px rgba(255,220,100,.7), inset 0 -5px 0 rgba(0,0,0,.22); }
    50%     { box-shadow: 0 0 24px rgba(255,220,100,1),  inset 0 -5px 0 rgba(0,0,0,.22); }
  }

  /* -------- Footer -------- */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px;
    font-size: 13px; color: var(--ink-soft);
    letter-spacing: 2px;
  }
  .footer .legend { display: flex; gap: 14px; align-items: center; }
  .footer .chip { display: inline-flex; align-items: center; gap: 6px; }
  .footer .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cinnabar); }

  /* Toast */
  .toast {
    position: absolute; left: 50%; top: 44%;
    transform: translateX(-50%);
    font-family: "Noto Serif TC", serif; font-weight: 900;
    color: #fcefd1; background: rgba(30,20,10,.72);
    padding: 18px 32px; border-radius: 8px;
    border: 2px solid var(--gold);
    font-size: 28px; letter-spacing: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    animation: toastin 1.8s ease forwards;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(201,162,74,.7);
    white-space: nowrap;
    z-index: 300;
  }
  @keyframes toastin {
    0% { opacity: 0; transform: translate(-50%, 10%) scale(.85); }
    15%,70% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -10%) scale(1); }
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 18px; bottom: 18px;
    background: #fff6e1;
    border: 2px solid var(--wood-d);
    border-radius: 8px;
    padding: 12px 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,230,180,.6);
    font-size: 13px;
    display: none;
    z-index: 1000;
    min-width: 180px;
  }
  .tweaks.show { display: block; }
  .tweaks h4 {
    margin: 0 0 8px; font-family: "Noto Serif TC", serif; font-size: 14px; letter-spacing: 3px;
    color: var(--cinnabar-d);
  }
  .tweaks label { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 6px 0; }
  .switch { position: relative; width: 42px; height: 22px; background: #caa971; border-radius: 11px; cursor: pointer; border: 1px solid var(--wood-d); }
  .switch > span { position: absolute; top: 1px; left: 1px; width: 18px; height: 18px; background: #fff6e1; border-radius: 50%; transition: left .15s; border: 1px solid var(--wood-d); }
  .switch.on { background: var(--bamboo); }
  .switch.on > span { left: 21px; }

  /* Assumptions card shown while loading */
  .boot {
    color: #f4ead5;
    font-family: "Noto Serif TC", serif;
    text-align: center;
    padding: 60px 24px;
  }
  .boot h1 { font-size: 42px; letter-spacing: 8px; margin: 0 0 8px; }
  .boot p { opacity: .75; letter-spacing: 4px; }

  /* ================ 佈陣會議 Briefing ================ */
  .briefing {
    width: min(1320px, 100%);
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,162,74,.12) 0%, transparent 55%),
      linear-gradient(180deg, #f4ead5 0%, #ead9b0 100%);
    border: 3px solid var(--wood-d);
    border-radius: 10px;
    box-shadow: 0 30px 80px rgba(0,0,0,.55), inset 0 0 120px rgba(107,74,43,.12);
    padding: 28px 34px 22px;
    color: var(--ink);
    position: relative;
  }
  .briefing::before, .briefing::after {
    content: ""; position: absolute; left: 0; right: 0; height: 14px;
    background: linear-gradient(180deg, #6b4a2b, #3e2912);
    border-radius: 3px;
  }
  .briefing::before { top: -18px; }
  .briefing::after  { bottom: -18px; }

  .bf-banner {
    text-align: center;
    padding: 12px 0 18px;
    border-bottom: 2px solid rgba(107,74,43,.35);
    margin-bottom: 18px;
    position: relative;
  }
  .bf-banner::after {
    content: "";
    position: absolute; left: 50%; bottom: -7px; transform: translateX(-50%);
    width: 30px; height: 12px; background: var(--cinnabar-d);
    clip-path: polygon(0 0, 100% 0, 90% 100%, 50% 70%, 10% 100%);
  }
  .bf-era  { font-family: "Noto Serif TC"; letter-spacing: 8px; color: var(--ink-soft); font-size: 14px; }
  .bf-name { font-size: 56px; font-weight: 900; letter-spacing: 20px; color: var(--cinnabar-d); margin: 4px 0 6px; }
  .bf-loc  { letter-spacing: 6px; color: var(--wood-d); font-weight: 700; margin-bottom: 10px; }
  .bf-intro{ max-width: 820px; margin: 10px auto 0; color: var(--ink-soft); line-height: 1.8; letter-spacing: 2px; font-size: 15px; text-wrap: pretty; }

  .bf-body {
    display: grid;
    grid-template-columns: 1.35fr 1fr .85fr;
    gap: 16px;
    align-items: stretch;
  }

  .bf-panel {
    background: linear-gradient(180deg, #fff6e1 0%, #f3e3bf 100%);
    border: 2px solid var(--wood-d);
    border-radius: 8px;
    padding: 14px;
    display: flex; flex-direction: column;
    min-height: 480px;
    box-shadow: inset 0 0 50px rgba(201,162,74,.18);
  }
  .bf-ph {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px; margin-bottom: 10px;
    border-bottom: 1px dashed rgba(107,74,43,.45);
  }
  .bf-ph-title {
    font-family: "Noto Serif TC"; font-weight: 900; letter-spacing: 8px; font-size: 16px; color: var(--ink);
  }
  .bf-count {
    font-family: "Noto Serif TC"; font-weight: 900; letter-spacing: 2px; font-size: 14px;
    background: #fff6e1; border: 1.5px solid var(--wood); border-radius: 14px;
    padding: 2px 12px; color: var(--ink-soft);
  }
  .bf-count.ready { background: var(--bamboo-d); color: #f4ead5; border-color: var(--bamboo-d); }

  .bf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
    gap: 10px;
    overflow-y: auto;
    flex: 1;
    padding-right: 2px;
  }
  .bf-card {
    background: #fff6e1;
    border: 2px solid var(--wood);
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: transform .15s, border-color .15s, background .15s;
  }
  .bf-card:hover { transform: translateY(-2px); border-color: var(--cinnabar-d); }
  .bf-card.active { box-shadow: 0 0 0 3px var(--cinnabar), 0 0 0 5px #fff6e1; }
  .bf-card.picked { background: linear-gradient(180deg,#e2f0cb,#c6dfa2); border-color: var(--bamboo-d); }
  .bf-card.disabled { opacity: .45; }
  .bf-card-portrait { height: 60px; display: flex; align-items: center; justify-content: center; position: relative; }
  .bf-pick-mark {
    position: absolute; top: -6px; right: -6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bamboo-d); color: #fff6e1;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; box-shadow: 0 2px 4px rgba(0,0,0,.3);
  }
  .bf-card-name { font-family: "Noto Serif TC"; font-weight: 700; letter-spacing: 3px; margin-top: 4px; font-size: 14px; }
  .bf-card-cost { color: var(--cinnabar-d); font-size: 12px; letter-spacing: 2px; }
  .bf-pick-btn {
    margin-top: 6px;
    border: 1.5px solid var(--wood-d);
    background: linear-gradient(180deg,#f7ecd3,#ecdcb4);
    font-family: "Noto Serif TC"; font-weight: 700; letter-spacing: 3px;
    padding: 3px 8px; border-radius: 4px; cursor: pointer;
    font-size: 12px; color: var(--ink);
    width: 100%;
  }
  .bf-pick-btn.on { background: linear-gradient(180deg,#b23a2a,#7d2519); color: #f4ead5; border-color: var(--cinnabar-d); }
  .bf-pick-btn:disabled { cursor: not-allowed; opacity: .5; }

  .bf-det { flex: 1; overflow-y: auto; padding: 6px 8px; }
  .bf-det-portrait {
    height: 140px; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 60%, rgba(201,162,74,.35), transparent 60%),
      repeating-linear-gradient(45deg, rgba(107,74,43,.05) 0 6px, transparent 6px 12px);
    border: 1.5px dashed rgba(107,74,43,.45);
    border-radius: 6px;
    margin-bottom: 10px;
  }
  .bf-det-title { font-size: 26px; font-weight: 900; letter-spacing: 6px; color: var(--cinnabar-d); text-align: center; }
  .bf-det-sub  { text-align: center; letter-spacing: 3px; color: var(--ink-soft); margin-top: 2px; font-size: 13px; }
  .bf-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 12px 0;
  }
  .bf-stat {
    background: #fff6e1; border: 1px solid var(--wood); border-radius: 4px;
    padding: 6px 10px;
  }
  .bf-stat-l { color: var(--ink-soft); font-size: 11px; letter-spacing: 3px; }
  .bf-stat-v { font-family: "Noto Serif TC"; font-weight: 900; color: var(--cinnabar-d); font-size: 16px; letter-spacing: 2px; }
  .bf-det-desc { letter-spacing: 1.5px; line-height: 1.7; color: var(--ink); padding: 6px 2px; min-height: 3.4em; }
  .bf-det-story {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(107,74,43,.08);
    border-left: 3px solid var(--cinnabar-d);
    letter-spacing: 2px; line-height: 1.8; color: var(--ink-soft);
    font-family: "Noto Serif TC"; font-size: 13.5px; text-wrap: pretty;
    min-height: 5.4em;
  }

  .bf-elist { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; padding-right: 2px; }
  .bf-erow {
    display: flex; align-items: center; gap: 10px;
    background: #fff6e1; border: 1.5px solid var(--wood);
    border-radius: 5px; padding: 6px 10px; cursor: pointer;
    transition: border-color .15s, transform .15s;
  }
  .bf-erow:hover { border-color: var(--cinnabar-d); transform: translateX(2px); }
  .bf-erow.active { box-shadow: 0 0 0 3px var(--cinnabar); background: linear-gradient(180deg,#fff6e1,#f3d8c3); }
  .bf-erow-pic { width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; }
  .bf-erow-name { font-family: "Noto Serif TC"; font-weight: 800; letter-spacing: 3px; }
  .bf-erow-sub  { font-size: 11px; color: var(--ink-soft); letter-spacing: 2px; }

  .bf-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 18px; padding-top: 16px;
    border-top: 2px solid rgba(107,74,43,.35);
  }
  .bf-foot-hint {
    font-family: "Noto Serif TC"; letter-spacing: 4px; color: var(--ink-soft);
  }
  .bf-launch {
    font-family: "Noto Serif TC"; font-weight: 900; letter-spacing: 10px; font-size: 22px;
    padding: 12px 38px;
    background: linear-gradient(180deg,#b23a2a,#7d2519);
    color: #f4ead5;
    border: 2.5px solid var(--cinnabar-d);
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(42,36,28,.4), 0 12px 24px rgba(178,58,42,.35);
    transition: transform .12s, box-shadow .12s, filter .12s;
  }
  .bf-launch:disabled { filter: grayscale(.6) brightness(.75); cursor: not-allowed; box-shadow: 0 3px 0 rgba(42,36,28,.3); }
  .bf-launch.ready:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(42,36,28,.4), 0 18px 30px rgba(178,58,42,.55); }
  .bf-launch.ready { animation: bf-pulse 1.8s ease-in-out infinite; }
  @keyframes bf-pulse {
    0%, 100% { box-shadow: 0 6px 0 rgba(42,36,28,.4), 0 12px 24px rgba(178,58,42,.35); }
    50%      { box-shadow: 0 6px 0 rgba(42,36,28,.4), 0 14px 34px rgba(201,162,74,.75); }
  }

  @media (max-width: 960px) {
    .bf-body { grid-template-columns: 1fr; }
  }

  /* ================ Battle Transition 過場 ================ */
  .bt {
    position: fixed; inset: 0; z-index: 999;
    background: #0b0806;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .bt-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 80%, rgba(255,120,40,.55) 0%, transparent 45%),
      radial-gradient(ellipse at 70% 90%, rgba(255,80,20,.55) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 70%, rgba(255,180,60,.35) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 40%, rgba(178,58,42,.45) 0%, transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,0,0,.35) 0 2px, transparent 2px 4px),
      linear-gradient(180deg, #3a1a08 0%, #1a0a05 100%);
    animation: bt-flicker 0.35s ease-in-out infinite alternate;
  }
  @keyframes bt-flicker {
    0%   { filter: brightness(1) hue-rotate(0deg); }
    100% { filter: brightness(1.25) hue-rotate(-8deg); }
  }
  .bt-ink {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(0,0,0,.7) 90%);
    mix-blend-mode: multiply;
    opacity: .85;
  }
  /* ember particles rising */
  .bt-bg::before, .bt-bg::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 10% 110%, rgba(255,200,80,.9) 0, transparent 2px),
      radial-gradient(circle at 25% 120%, rgba(255,140,40,.9) 0, transparent 2.5px),
      radial-gradient(circle at 45% 115%, rgba(255,220,120,.8) 0, transparent 2px),
      radial-gradient(circle at 65% 125%, rgba(255,120,40,.9) 0, transparent 2.2px),
      radial-gradient(circle at 80% 118%, rgba(255,200,80,.9) 0, transparent 2px),
      radial-gradient(circle at 92% 122%, rgba(255,160,60,.9) 0, transparent 2.4px);
    background-size: 100% 180%;
    animation: bt-embers 3.2s linear infinite;
    pointer-events: none;
  }
  .bt-bg::after { animation-duration: 4.5s; animation-delay: -1.5s; opacity: .7; }
  @keyframes bt-embers {
    0%   { background-position-y: 0%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { background-position-y: -180%; opacity: 0; }
  }

  /* brush banner characters slide in one-by-one */
  .bt-banner {
    position: absolute;
    top: 18%;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 28px;
  }
  .bt-brush {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 110px;
    color: #f4ead5;
    letter-spacing: 0;
    text-shadow: 0 0 24px rgba(255,180,80,.5), 0 4px 0 #7d2519;
    opacity: 0;
    transform: translateY(-40px) rotate(-6deg) scale(.8);
    filter: blur(8px);
    transition: all .28s cubic-bezier(.2,.9,.3,1.2);
  }
  .bt-p1 .bt-brush:nth-child(1),
  .bt-p2 .bt-brush:nth-child(-n+2),
  .bt-p3 .bt-brush:nth-child(-n+3),
  .bt-p4 .bt-brush,
  .bt-p5 .bt-brush {
    opacity: 1; transform: translateY(0) rotate(0) scale(1); filter: blur(0);
  }

  .bt-name {
    position: absolute; top: 58%; left: 50%; transform: translate(-50%, 0) scale(.5);
    font-size: 90px; font-weight: 900; letter-spacing: 28px;
    color: var(--gold);
    text-shadow: 0 0 28px rgba(201,162,74,.6), 0 6px 0 #3e2912;
    opacity: 0;
    transition: transform .7s cubic-bezier(.2,.9,.3,1.2), opacity .5s;
  }
  .bt-p3 .bt-name, .bt-p4 .bt-name, .bt-p5 .bt-name {
    opacity: 1; transform: translate(-50%, 0) scale(1);
  }
  .bt-sub {
    position: absolute; top: 72%; left: 50%; transform: translateX(-50%);
    letter-spacing: 12px; color: rgba(244,234,213,.8); font-weight: 500;
    opacity: 0; transition: opacity .5s .15s;
  }
  .bt-p3 .bt-sub, .bt-p4 .bt-sub, .bt-p5 .bt-sub { opacity: 1; }

  .bt-seal {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0) rotate(-30deg);
    width: 180px; height: 180px;
    background: #b23a2a;
    color: #f4ead5;
    font-family: "Noto Serif TC"; font-weight: 900; font-size: 64px;
    letter-spacing: 6px;
    display: flex; align-items: center; justify-content: center;
    border: 6px solid #7d2519;
    box-shadow: 0 0 60px rgba(178,58,42,.7);
    opacity: 0;
    transition: transform .45s cubic-bezier(.2,1.4,.3,1), opacity .2s;
    z-index: 3;
  }
  .bt-p4 .bt-seal { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  .bt-p5 .bt-seal { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(6deg); filter: brightness(1.15); }

  /* diagonal slash */
  .bt-slash {
    position: absolute; top: -10%; left: -10%;
    width: 140%; height: 8px;
    background: linear-gradient(90deg, transparent 0%, #f4ead5 50%, transparent 100%);
    transform: rotate(-18deg) translateX(-120%);
    opacity: 0;
    transition: transform .45s cubic-bezier(.3,.8,.2,1), opacity .3s;
    filter: blur(1px);
    box-shadow: 0 0 20px rgba(244,234,213,.8);
  }
  .bt-p4 .bt-slash { opacity: 1; transform: rotate(-18deg) translateX(0); }

  /* drum marks */
  .bt-drums { position: absolute; inset: 0; pointer-events: none; }
  .bt-drum {
    position: absolute; bottom: 10%;
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(201,162,74,.7);
    box-shadow: 0 0 10px rgba(201,162,74,.6);
    animation: bt-rise 1.8s ease-out infinite;
    opacity: 0;
  }
  .bt-p2 .bt-drum, .bt-p3 .bt-drum, .bt-p4 .bt-drum, .bt-p5 .bt-drum { opacity: 1; }
  @keyframes bt-rise {
    0%   { transform: translateY(0); opacity: 0; }
    20%  { opacity: .9; }
    100% { transform: translateY(-400px); opacity: 0; }
  }
</style>

<script>
  // Tweakable defaults, persisted via host
  window.__TWEAKS = /*EDITMODE-BEGIN*/{
    "night": true,
    "qiPerSecond": 18,
    "startQi": 200,
    "rosterSize": 7
  }/*EDITMODE-END*/;
</script>
</head>
<body>
<div id="root"><div class="boot"><h1>俠客守江山</h1><p>載入中…</p></div></div>

<div id="tweaks" class="tweaks">
  <h4>TWEAKS · 調整</h4>
  <label>日夜 <span style="color:var(--ink-l);font-size:11px">（每場隨機）</span></label>
  <label>內力生成速度
    <input id="qi-rate" type="range" min="6" max="40" step="2" />
  </label>
  <label>起始內力
    <input id="qi-start" type="range" min="50" max="300" step="10" />
  </label>
  <label>出戰名額 (俠客)
    <input id="roster-size" type="range" min="1" max="10" step="1" />
  </label>

<script type="text/babel" data-presets="env,react" src="briefing.jsx"></script>
<script type="text/babel" data-presets="env,react" src="game.jsx"></script>
<script>
  // Tweaks host protocol
  (function(){
    window.addEventListener('message', (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('show');
      if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('show');
    });
    window.parent.postMessage({type: '__edit_mode_available'}, '*');

    function persist(edits) {
      Object.assign(window.__TWEAKS, edits);
      window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*');
      window.dispatchEvent(new CustomEvent('tweaks-change', { detail: window.__TWEAKS }));
    }
    window.__persistTweak = persist;
  })();
</script>
</body>
